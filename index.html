
    <!DOCTYPE html>
    <html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Daily Quote</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
        <style>
            body {
                margin: 0;
                padding: 0;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: #f4f4f5;
                font-family: 'Noto Serif TC', serif;
                color: #27272a;
            }
            .card {
                background: white;
                padding: 4rem 5rem;
                border-radius: 16px;
                box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05);
                max-width: 800px;
                width: 85%;
                text-align: center;
                position: relative;
            }
            .quote-mark {
                font-size: 8rem;
                color: #f4f4f5;
                position: absolute;
                top: -10px;
                left: 30px;
                font-family: Arial, sans-serif;
                line-height: 1;
            }
            .content {
                font-size: 2.2rem;
                line-height: 1.6;
                margin-bottom: 2rem;
                font-weight: 700;
                position: relative;
                z-index: 1;
            }
            .author {
                font-size: 1.3rem;
                color: #71717a;
                font-style: italic;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="quote-mark">“</div>
            <div class="content">目前沒有語錄，請至 Notion 新增！</div>
            <div class="author"></div>
        </div>
    </body>
    </html>
